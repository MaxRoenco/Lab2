name: Deploy Lab 6 to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: lab6/package-lock.json

      - name: Install Lab 6 dependencies
        working-directory: lab6
        run: npm ci

      - name: Build Lab 6
        working-directory: lab6
        run: npm run build

      - name: Prepare Pages artifact
        run: |
          mkdir -p public/lab6
          cp index.html reset.css style.css README.md public/
          cp -R src public/src
          cp -R lab6/dist/* public/lab6/
          touch public/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
