          - {
              label: "Mobile Stat 3 Label",
              name: "mobile_stat_3_label",
              widget: "string",
            }
          - {
              label: "Mobile Spotlight CTA Label",
              name: "mobile_spotlight_cta_label",
              widget: "string",
            }
          - {
              label: "Mobile Spotlight CTA Href",
              name: "mobile_spotlight_cta_href",
              widget: "string",
            }
          - { label: "About Label", name: "about_label", widget: "string" }
          - { label: "About Title", name: "about_title", widget: "string" }
          - { label: "About Paragraph 1", name: "about_text_1", widget: "text" }
          - { label: "About Paragraph 2", name: "about_text_2", widget: "text" }
          - {
