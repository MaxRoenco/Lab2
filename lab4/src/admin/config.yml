              label: "Mobile CTA Label",
              name: "mobile_cta_label",
              widget: "string",
            }
          - {
              label: "Mobile CTA Href",
              name: "mobile_cta_href",
              widget: "string",
            }

  - name: "courses"
    label: "Courses"
    folder: "lab4/src/content/courses"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Tags", name: "tags", widget: "hidden", default: "course" }
      - {
          label: "Permalink",
          name: "permalink",
          widget: "hidden",
          default: false,
        }
      - { label: "Order", name: "order", widget: "number", value_type: "int" }
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Level", name: "level", widget: "string" }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Duration", name: "duration", widget: "string" }
      - { label: "Sessions", name: "sessions", widget: "string" }
      - {
          label: "Max Students",
          name: "max_students",
          widget: "number",
          value_type: "int",
        }
      - { label: "Icon (emoji or HTML entity)", name: "icon", widget: "string" }
      - {
          label: "Featured",
          name: "featured",
          widget: "boolean",
          default: false,
        }
      - { label: "Body", name: "body", widget: "markdown", required: false }

  - name: "testimonials"
    label: "Testimonials"
    folder: "lab4/src/content/testimonials"
    create: true
    slug: "{{slug}}"
    fields:
      - {
          label: "Tags",
          name: "tags",
          widget: "hidden",
          default: "testimonial",
        }
      - {
          label: "Permalink",
          name: "permalink",
          widget: "hidden",
          default: false,
        }
      - { label: "Order", name: "order", widget: "number", value_type: "int" }
      - { label: "Author", name: "author", widget: "string" }
      - { label: "Initials", name: "initials", widget: "string" }
      - { label: "Role", name: "role", widget: "string" }
      - { label: "Quote", name: "quote", widget: "text" }
      - {
          label: "Featured",
          name: "featured",
          widget: "boolean",
          default: false,
        }
      - { label: "Body", name: "body", widget: "markdown", required: false }

  - name: "gallery"
    label: "Gallery"
    folder: "lab4/src/content/gallery"
    create: true
    slug: "{{slug}}"
    fields:
      - {
          label: "Tags",
          name: "tags",
          widget: "hidden",
          default: "galleryItem",
        }
      - {
          label: "Permalink",
          name: "permalink",
          widget: "hidden",
          default: false,
        }
      - { label: "Order", name: "order", widget: "number", value_type: "int" }
      - { label: "Image", name: "image", widget: "image" }
      - { label: "Image Alt", name: "alt", widget: "string" }
      - { label: "Caption", name: "caption", widget: "string" }
      - { label: "Body", name: "body", widget: "markdown", required: false }
