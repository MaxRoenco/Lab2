              name: "programs_title",
              widget: "string",
            }
          - {
              label: "Programs Subtitle",
              name: "programs_subtitle",
              widget: "text",
            }
          - { label: "Gallery Label", name: "gallery_label", widget: "string" }
          - { label: "Gallery Title", name: "gallery_title", widget: "string" }
          - {
              label: "Gallery Subtitle",
              name: "gallery_subtitle",
              widget: "text",
            }
          - {
              label: "Testimonials Label",
              name: "testimonials_label",
              widget: "string",
            }
          - {
              label: "Testimonials Title",
              name: "testimonials_title",
              widget: "string",
            }
          - { label: "Contact Label", name: "contact_label", widget: "string" }
          - { label: "Contact Title", name: "contact_title", widget: "string" }
