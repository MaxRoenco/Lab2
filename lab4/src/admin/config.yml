backend:
  name: git-gateway
  branch: master

local_backend: true

media_folder: "lab4/src/assets/images"
public_folder: "/assets/images"

collections:
  - name: "global"
    label: "Global Settings"
    files:
      - label: "Site Data"
        name: "site"
        file: "lab4/src/_data/site.json"
        format: "json"
        fields:
          - label: "Meta"
            name: "meta"
            widget: "object"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
              - { label: "Language", name: "lang", widget: "string" }
          - { label: "Brand", name: "brand", widget: "string" }
          - label: "Navigation"
            name: "nav"
            widget: "list"
            summary: "{{fields.label}} -> {{fields.href}}"
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "Href", name: "href", widget: "string" }
          - label: "Navigation CTA"
            name: "navCta"
            widget: "object"
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "Href", name: "href", widget: "string" }
          - label: "Footer"
            name: "footer"
            widget: "object"
            fields:
              - {
                  label: "Brand Description",
                  name: "brandDescription",
                  widget: "text",
                }
              - label: "Quick Links"
                name: "quickLinks"
                widget: "list"
                summary: "{{fields.label}} -> {{fields.href}}"
                fields:
                  - { label: "Label", name: "label", widget: "string" }
                  - { label: "Href", name: "href", widget: "string" }
              - label: "Courses Links"
                name: "coursesLinks"
                widget: "list"
                summary: "{{fields.label}} -> {{fields.href}}"
                fields:
                  - { label: "Label", name: "label", widget: "string" }
                  - { label: "Href", name: "href", widget: "string" }
              - label: "Social Links"
                name: "social"
                widget: "list"
                summary: "{{fields.label}} -> {{fields.href}}"
                fields:
                  - { label: "Label", name: "label", widget: "string" }
                  - { label: "Href", name: "href", widget: "string" }
              - { label: "Copyright", name: "copyright", widget: "string" }

  - name: "home"
    label: "Landing Page"
    files:
      - label: "Home Sections"
        name: "home"
        file: "lab4/src/content/home.md"
        fields:
          - { label: "Tags", name: "tags", widget: "hidden", default: "home" }
          - {
              label: "Permalink",
              name: "permalink",
              widget: "hidden",
              default: false,
            }
          - { label: "Hero Label", name: "hero_label", widget: "string" }
          - { label: "Hero Title", name: "hero_title", widget: "string" }
          - { label: "Hero Subtitle", name: "hero_subtitle", widget: "text" }
          - {
              label: "Hero Primary CTA Label",
              name: "hero_primary_label",
              widget: "string",
            }
          - {
              label: "Hero Primary CTA Href",
              name: "hero_primary_href",
              widget: "string",
            }
          - {
              label: "Hero Secondary CTA Label",
              name: "hero_secondary_label",
              widget: "string",
            }
          - {
              label: "Hero Secondary CTA Href",
              name: "hero_secondary_href",
              widget: "string",
            }
          - {
              label: "Mobile Spotlight Eyebrow",
              name: "mobile_spotlight_eyebrow",
              widget: "string",
            }
          - {
              label: "Mobile Stat 1 Value",
              name: "mobile_stat_1_value",
              widget: "string",
            }
          - {
