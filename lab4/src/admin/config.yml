          - {
              label: "About CTA Href",
              name: "about_cta_href",
              widget: "string",
            }
          - { label: "About Image", name: "about_image", widget: "image" }
          - {
              label: "About Image Alt",
              name: "about_image_alt",
              widget: "string",
